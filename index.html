<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da velha</title>
    <link rel="stylesheet" href="styles/style.css" media="all">
    <link rel="stylesheet" href="styles/landscape.css" media="screen and (orientation: landscape)">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <div id="menu-game">
        <h1 id="title-game">JOGO DA VELHA</h1>
        <div id="buttons-container">
            <button id="2-players">
                2 PLAYERS
            </button>
            <button id="ai-players">
                IA PLAYER
            </button>
        </div>
    </div>
    <div id="container" class="hide">
        <div class="box" id="block-1"></div>
        <div class="box" id="block-2"></div>
        <div class="box" id="block-3"></div>
        <div class="box" id="block-4"></div>
        <div class="box" id="block-5"></div>
        <div class="box" id="block-6"></div>
        <div class="box" id="block-7"></div>
        <div class="box" id="block-8"></div>
        <div class="box" id="block-9"></div>

        <div id="scoreboard-container">
            <h2 id="title-placar">PLACAR</h2>
            
            <div id="score">
                <span class="score-box">
                    <span id="x-scoreboard" class="material-symbols-outlined">close</span>:
                    <span id="scoreboard-1">0</span>
                </span>
                <span class="score-box">
                    <span id="o-scoreboard" class="material-symbols-outlined">circle</span>:
                    <span id="scoreboard-2">0</span>
                </span>
            </div>
            <button id="back-menu" class="buttons-back">Voltar ao Menu</button>
            <button id="reset-score" class="buttons-back">Resetar Placar</button>
        </div>
        
    </div>

    <div class="hide">
        <div class="o">
        </div>
        <div class="x">X
        </div>
    </div>

    <div id="message" class="hide">
        <p></p>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
